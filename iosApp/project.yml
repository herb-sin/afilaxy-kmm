name: iosApp
options:
  bundleIdPrefix: com.afilaxy
  deploymentTarget:
    iOS: "14.0"
  xcodeVersion: "15"

settings:
  SWIFT_VERSION: "5.9"
  DEVELOPMENT_TEAM: "$(DEVELOPMENT_TEAM)"

targets:
  iosApp:
    type: application
    platform: iOS
    deploymentTarget: "14.0"
    sources:
      - path: iosApp
    resources:
      - path: iosApp/GoogleService-Info.plist
      - path: iosApp/Assets.xcassets
        optional: true
    info:
      path: iosApp/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.afilaxy.app
        INFOPLIST_FILE: iosApp/Info.plist
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "14.0"
        DEVELOPMENT_TEAM: "$(DEVELOPMENT_TEAM)"
        CODE_SIGN_STYLE: Automatic

schemes:
  iosApp:
    build:
      targets:
        iosApp: all
    run:
      config: Debug
    archive:
      config: Release
