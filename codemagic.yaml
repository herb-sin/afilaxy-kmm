workflows:
  ios-development:
    name: iOS Development Build
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      groups:
        - ios_signing
      vars:
        XCODE_SCHEME: "iosApp"
        BUNDLE_ID: "br.com.afilaxy.app"
        DEVELOPMENT_TEAM: "3V3X7CDR22"
      xcode: latest
      cocoapods: default
      java: 17

    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Generate Xcode project
        script: |
          cd $CM_BUILD_DIR/iosApp
          DEVELOPMENT_TEAM=$DEVELOPMENT_TEAM xcodegen generate

      - name: Set version in Info.plist
        script: |
          cd $CM_BUILD_DIR/iosApp/iosApp
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 2.1.0" Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion 16" Info.plist
          echo "Version set:"
          /usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" Info.plist
          /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" Info.plist

      - name: Make gradlew executable
        script: |
          cd $CM_BUILD_DIR
          chmod +x gradlew
          ls -la gradlew

      - name: Setup Java and test Gradle
        script: |
          cd $CM_BUILD_DIR
          export JAVA_HOME=$(/usr/libexec/java_home -v 17 2>/dev/null || /usr/libexec/java_home)
          export PATH="$JAVA_HOME/bin:$PATH"
          echo "JAVA_HOME: $JAVA_HOME"
          echo "Java version:"
          java -version
          echo "Testing Gradle:"
          ./gradlew --version

      - name: Build KMM Framework for iOS
        script: |
          cd $CM_BUILD_DIR
          export JAVA_HOME=$(/usr/libexec/java_home -v 17 2>/dev/null || /usr/libexec/java_home)
          export PATH="$JAVA_HOME/bin:$PATH"
          # Compilar framework para Release
          ./gradlew :shared:syncFramework \
            -Pkotlin.native.cocoapods.platform=iphoneos \
            -Pkotlin.native.cocoapods.archs=arm64 \
            -Pkotlin.native.cocoapods.configuration=Release

      - name: Install CocoaPods dependencies
        script: |
          cd $CM_BUILD_DIR/iosApp
          export JAVA_HOME=$(/usr/libexec/java_home -v 17 2>/dev/null || /usr/libexec/java_home)
          export PATH="$JAVA_HOME/bin:$PATH"
          # Desabilitar script phase do CocoaPods
          export OVERRIDE_KOTLIN_BUILD_IDE_SUPPORTED=YES
          pod install --repo-update

      - name: Set up keychain and fetch certificates
        script: |
          keychain initialize
          # Decodificar base64 → PEM e exportar como env var
          export APP_STORE_CONNECT_PRIVATE_KEY=$(echo "$APP_STORE_CONNECT_PRIVATE_KEY" | base64 --decode)
          # Usar chave de certificado persistida (decodificar base64 → PEM)
          CERT_KEY=$(echo "$CERTIFICATE_PRIVATE_KEY" | base64 --decode)
          app-store-connect fetch-signing-files \
            "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --certificate-key "$CERT_KEY" \
            --strict-match-identifier \
            --create
          keychain add-certificates

      - name: Build and Export IPA
        script: |
          xcode-project use-profiles
          cd $CM_BUILD_DIR/iosApp
          # Verificar versão antes do build
          echo "=== Versão no Info.plist antes do build ==="
          /usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" iosApp/Info.plist
          /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" iosApp/Info.plist
          
          cd $CM_BUILD_DIR/iosApp
          xcode-project build-ipa \
            --workspace "iosApp.xcworkspace" \
            --scheme "$XCODE_SCHEME" \
            --config Release

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - iosApp/build.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        
        submit_to_testflight: true
        beta_groups:
          - Internal Testing
