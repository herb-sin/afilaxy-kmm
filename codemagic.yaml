workflows:
  ios-development:
    name: iOS Development Build
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      groups:
        - ios_signing
      vars:
        XCODE_SCHEME: "iosApp"
        BUNDLE_ID: "com.afilaxy.app"
        DEVELOPMENT_TEAM: "3V3X7CDR22"
      xcode: latest
      cocoapods: default
      java: 17

    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Generate Xcode project
        script: |
          cd $CM_BUILD_DIR/iosApp
          DEVELOPMENT_TEAM=$DEVELOPMENT_TEAM xcodegen generate

      - name: Make gradlew executable
        script: |
          cd $CM_BUILD_DIR
          chmod +x gradlew
          ls -la gradlew

      - name: Setup Java and test Gradle
        script: |
          cd $CM_BUILD_DIR
          export JAVA_HOME=$(/usr/libexec/java_home -v 17 2>/dev/null || /usr/libexec/java_home)
          export PATH="$JAVA_HOME/bin:$PATH"
          echo "JAVA_HOME: $JAVA_HOME"
          echo "Java version:"
          java -version
          echo "Testing Gradle:"
          ./gradlew --version

      - name: Generate Dummy Framework
        script: |
          cd $CM_BUILD_DIR
          export JAVA_HOME=$(/usr/libexec/java_home -v 17 2>/dev/null || /usr/libexec/java_home)
          export PATH="$JAVA_HOME/bin:$PATH"
          ./gradlew :shared:generateDummyFramework

      - name: Install CocoaPods dependencies
        script: |
          cd $CM_BUILD_DIR/iosApp
          export JAVA_HOME=$(/usr/libexec/java_home -v 17 2>/dev/null || /usr/libexec/java_home)
          export PATH="$JAVA_HOME/bin:$PATH"
          pod install --repo-update

      - name: Set up keychain and fetch certificates
        script: |
          keychain initialize
          # Decodificar base64 → PEM e exportar como env var
          export APP_STORE_CONNECT_PRIVATE_KEY=$(echo "$APP_STORE_CONNECT_PRIVATE_KEY" | base64 --decode)
          # Usar chave de certificado persistida (decodificar base64 → PEM)
          CERT_KEY=$(echo "$CERTIFICATE_PRIVATE_KEY" | base64 --decode)
          app-store-connect fetch-signing-files \
            "$BUNDLE_ID" \
            --type IOS_APP_DEVELOPMENT \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --certificate-key "$CERT_KEY" \
            --strict-match-identifier \
            --delete-stale-profiles \
            --create
          keychain add-certificates

      - name: Build iOS app
        script: |
          xcode-project use-profiles
          cd $CM_BUILD_DIR/iosApp
          # Exportar JAVA_HOME e PATH globalmente
          export JAVA_HOME=$(/usr/libexec/java_home -v 17 2>/dev/null || /usr/libexec/java_home)
          export PATH="$JAVA_HOME/bin:$PATH"
          
          # Verificar se Gradle está acessível
          echo "Testing Gradle access:"
          cd $CM_BUILD_DIR
          ./gradlew --version
          
          # Build com logs detalhados
          cd $CM_BUILD_DIR/iosApp
          xcodebuild \
            -workspace iosApp.xcworkspace \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=$DEVELOPMENT_TEAM \
            JAVA_HOME="$JAVA_HOME" \
            PATH="$PATH" \
            -verbose \
            build 2>&1 | tee xcodebuild.log

      - name: Export IPA
        script: |
          xcode-project build-ipa \
            --workspace "$CM_BUILD_DIR/iosApp/iosApp.xcworkspace" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - iosApp/xcodebuild.log
