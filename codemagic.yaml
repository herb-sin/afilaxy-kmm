workflows:
  ios-development:
    name: iOS Development Build
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      ios_signing:
        distribution_type: development
        bundle_identifier: com.afilaxy.app
      vars:
        XCODE_PROJECT: "iosApp/iosApp.xcodeproj"
        XCODE_SCHEME: "iosApp"
        BUNDLE_ID: "com.afilaxy.app"
      xcode: latest
      cocoapods: default

    scripts:
      - name: Set up Kotlin Multiplatform shared framework
        script: |
          cd $CM_BUILD_DIR
          ./gradlew :shared:assembleDebugXCFramework

      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Generate Xcode project
        script: |
          cd $CM_BUILD_DIR/iosApp
          xcodegen generate

      - name: Install CocoaPods dependencies
        script: |
          cd $CM_BUILD_DIR/iosApp
          pod install --repo-update

      - name: Build iOS app
        script: |
          xcode-project use-profiles
          cd $CM_BUILD_DIR/iosApp
          xcodebuild \
            -workspace iosApp.xcworkspace \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=$DEVELOPMENT_TEAM \
            clean build

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log


