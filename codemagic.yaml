workflows:
  ios-development:
    name: iOS Development Build
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      groups:
        - ios_signing
      vars:
        XCODE_SCHEME: "iosApp"
        BUNDLE_ID: "com.afilaxy.app"
        DEVELOPMENT_TEAM: "3V3X7CDR22"
      xcode: latest
      cocoapods: default
      java: 17

    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Generate Xcode project
        script: |
          cd $CM_BUILD_DIR/iosApp
          DEVELOPMENT_TEAM=$DEVELOPMENT_TEAM xcodegen generate

      - name: Generate dummy KMM framework (required before pod install)
        script: |
          cd $CM_BUILD_DIR
          ./gradlew :shared:generateDummyFramework

      - name: Install CocoaPods dependencies
        script: |
          cd $CM_BUILD_DIR/iosApp
          pod install --repo-update

      - name: Set up keychain and fetch certificates
        script: |
          keychain initialize
          # Decodificar base64 → PEM e exportar como env var para o CLI ler automaticamente
          export APP_STORE_CONNECT_PRIVATE_KEY=$(echo "$APP_STORE_CONNECT_PRIVATE_KEY" | base64 --decode)
          app-store-connect fetch-signing-files \
            "$BUNDLE_ID" \
            --type IOS_APP_DEVELOPMENT \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --create
          keychain add-certificates

      - name: Build iOS app
        script: |
          xcode-project use-profiles
          cd $CM_BUILD_DIR/iosApp
          xcodebuild \
            -workspace iosApp.xcworkspace \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=$DEVELOPMENT_TEAM \
            clean build

      - name: Export IPA
        script: |
          xcode-project build-ipa \
            --workspace "$CM_BUILD_DIR/iosApp/iosApp.xcworkspace" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
