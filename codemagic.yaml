workflows:
  ios-development:
    name: iOS Development Build
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      groups:
        - ios_signing
      vars:
        XCODE_SCHEME: "iosApp"
        BUNDLE_ID: "com.afilaxy.app"
        DEVELOPMENT_TEAM: "3V3X7CDR22"
      xcode: latest
      cocoapods: default
      java: 17

    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Generate Xcode project
        script: |
          cd $CM_BUILD_DIR/iosApp
          DEVELOPMENT_TEAM=$DEVELOPMENT_TEAM xcodegen generate

      - name: Make gradlew executable
        script: |
          cd $CM_BUILD_DIR
          chmod +x gradlew
          ls -la gradlew

      - name: Setup Java and test Gradle
        script: |
          cd $CM_BUILD_DIR
          export JAVA_HOME=$(/usr/libexec/java_home -v 17 2>/dev/null || /usr/libexec/java_home)
          export PATH="$JAVA_HOME/bin:$PATH"
          echo "JAVA_HOME: $JAVA_HOME"
          echo "Java version:"
          java -version
          echo "Testing Gradle:"
          ./gradlew --version

      - name: Build KMM Framework for iOS
        script: |
          cd $CM_BUILD_DIR
          export JAVA_HOME=$(/usr/libexec/java_home -v 17 2>/dev/null || /usr/libexec/java_home)
          export PATH="$JAVA_HOME/bin:$PATH"
          # Build framework para iOS usando CocoaPods task
          ./gradlew :shared:podInstall

      - name: Install CocoaPods dependencies
        script: |
          cd $CM_BUILD_DIR/iosApp
          export JAVA_HOME=$(/usr/libexec/java_home -v 17 2>/dev/null || /usr/libexec/java_home)
          export PATH="$JAVA_HOME/bin:$PATH"
          # Desabilitar script phase do CocoaPods
          export OVERRIDE_KOTLIN_BUILD_IDE_SUPPORTED=YES
          pod install --repo-update

      - name: Set up keychain and fetch certificates
        script: |
          keychain initialize
          # Decodificar base64 → PEM e exportar como env var
          export APP_STORE_CONNECT_PRIVATE_KEY=$(echo "$APP_STORE_CONNECT_PRIVATE_KEY" | base64 --decode)
          # Usar chave de certificado persistida (decodificar base64 → PEM)
          CERT_KEY=$(echo "$CERTIFICATE_PRIVATE_KEY" | base64 --decode)
          app-store-connect fetch-signing-files \
            "$BUNDLE_ID" \
            --type IOS_APP_DEVELOPMENT \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --certificate-key "$CERT_KEY" \
            --strict-match-identifier \
            --delete-stale-profiles \
            --create
          keychain add-certificates

      - name: Build iOS app
        script: |
          xcode-project use-profiles
          cd $CM_BUILD_DIR/iosApp
          # Exportar variáveis e desabilitar script do CocoaPods
          export JAVA_HOME=$(/usr/libexec/java_home -v 17 2>/dev/null || /usr/libexec/java_home)
          export PATH="$JAVA_HOME/bin:$PATH"
          export OVERRIDE_KOTLIN_BUILD_IDE_SUPPORTED=YES
          
          # Build e capturar erros Swift
          set +e
          xcodebuild \
            -workspace iosApp.xcworkspace \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=$DEVELOPMENT_TEAM \
            OVERRIDE_KOTLIN_BUILD_IDE_SUPPORTED=YES \
            build 2>&1 | tee build.log
          
          BUILD_STATUS=${PIPESTATUS[0]}
          
          if [ $BUILD_STATUS -ne 0 ]; then
            echo "\n=== BUILD FAILED ==="
            echo "\n=== Swift Compilation Errors ==="
            grep -A 5 "error:" build.log || echo "No specific errors found"
            exit $BUILD_STATUS
          fi

      - name: Export IPA
        script: |
          xcode-project build-ipa \
            --workspace "$CM_BUILD_DIR/iosApp/iosApp.xcworkspace" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - iosApp/build.log
