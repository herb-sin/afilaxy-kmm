name: Android CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch: # permite rodar manualmente pelo GitHub Actions

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # Injeta google-services.json a partir do Secret (base64)
    - name: Inject google-services.json
      run: |
        echo "${{ secrets.FIREBASE_GOOGLE_SERVICES_JSON }}" | base64 --decode \
          > androidApp/google-services.json

    # Injeta MAPS_API_KEY e VERSION_CODE no local.properties para o build
    - name: Inject build properties
      run: |
        echo "MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}" >> local.properties
        echo "VERSION_CODE=${{ github.run_number }}" >> local.properties
    
    - name: Run shared module tests
      run: ./gradlew shared:testDebugUnitTest --stacktrace || true
    
    - name: Run Android unit tests
      run: ./gradlew androidApp:testDebugUnitTest --stacktrace || true
    
    - name: Build Android Debug APK
      run: ./gradlew androidApp:assembleDebug --stacktrace
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-${{ github.sha }}
        path: androidApp/build/outputs/apk/debug/*.apk
        retention-days: 7

