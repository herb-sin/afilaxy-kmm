name: iOS Build & Export IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      export_method:
        description: 'Export method (ad-hoc, app-store, development)'
        required: true
        default: 'ad-hoc'
        type: choice
        options:
          - ad-hoc
          - app-store
          - development

jobs:
  build-ios:
    runs-on: macos-15  # Xcode 16.4 — fixado para builds consistentes
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Injeta o GoogleService-Info.plist a partir do Secret (base64)
      - name: Inject GoogleService-Info.plist
        run: |
          echo "${{ secrets.FIREBASE_GOOGLE_SERVICE_PLIST }}" | base64 --decode \
            > iosApp/iosApp/GoogleService-Info.plist

      # Injeta o google-services.json para o módulo Android (necessário para o KMM shared)
      - name: Inject google-services.json
        run: |
          echo "${{ secrets.FIREBASE_GOOGLE_SERVICES_JSON }}" | base64 --decode \
            > androidApp/google-services.json

      # Gera o framework dummy do KMM — necessário para o pod install ler o shared.podspec.
      # O framework real é compilado pelo xcodebuild archive via integração CocoaPods.
      - name: Inject WAQI API token
        run: echo "WAQI_API_TOKEN=${{ secrets.WAQI_API_TOKEN }}" >> local.properties

      - name: Generate KMM dummy framework
        run: ./gradlew :shared:generateDummyFramework --no-daemon -Pkotlin.native.ignoreDisabledTargets=true

      # Instala o XcodeGen para gerar o .xcodeproj a partir do project.yml
      - name: Install XcodeGen
        run: brew install xcodegen

      # Gera o .xcodeproj a partir do project.yml (deve vir antes do pod install)
      - name: Generate Xcode project
        run: |
          cd iosApp
          # Remove projeto antigo para forçar regeneração
          rm -rf iosApp.xcodeproj
          xcodegen generate
          # Força versão correta no Info.plist gerado
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.0.0" iosApp/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.run_number }}" iosApp/Info.plist
          # Verifica versão gerada
          echo "Version: $(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' iosApp/Info.plist)"
          echo "Build: $(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' iosApp/Info.plist)"

      # Cache do repositório de specs do CocoaPods (~/.cocoapods/repos).
      # Evita baixar specs do GitHub CDN a cada run → elimina o erro 429.
      # A chave inclui o hash do Podfile; muda de spec repo só quando deps mudam.
      - name: Cache CocoaPods Specs
        uses: actions/cache@v4
        with:
          path: ~/.cocoapods
          key: cocoapods-specs-${{ hashFiles('iosApp/Podfile') }}
          restore-keys: |
            cocoapods-specs-

      # Cache dos Pods baixados — evita re-download de frameworks grandes
      # (ex.: FirebaseFirestore ~200 MB) a cada run.
      - name: Cache CocoaPods Pods
        uses: actions/cache@v4
        with:
          path: iosApp/Pods
          key: cocoapods-pods-${{ hashFiles('iosApp/Podfile.lock') }}
          restore-keys: |
            cocoapods-pods-

      # Instala os pods do iOS (depende do .xcodeproj já existir)
      # --no-repo-update: usa specs cacheadas — sem chamadas ao CDN GitHub → sem 429
      # Fallback --repo-update: só executa se um spec não for encontrado no cache.
      - name: Install CocoaPods
        run: |
          cd iosApp
          if pod install --no-repo-update 2>&1 | tee /tmp/pod_install.log | grep -qE "(Unable to find|not found in any of)" ; then
            echo "⚠️  Spec não encontrada no cache — fazendo repo-update..."
            pod install --repo-update
          else
            cat /tmp/pod_install.log
          fi

      # Importa o certificado de distribuição Apple (P12 em base64)
      - name: Import Apple Distribution Certificate
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.IOS_DISTRIBUTION_CERT_P12 }}
          p12-password: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}

      # Baixa o Provisioning Profile via App Store Connect API
      - name: Download Provisioning Profile
        id: provisioning
        uses: apple-actions/download-provisioning-profiles@v1
        with:
          bundle-id: 'com.afilaxy.app'
          issuer-id: ${{ secrets.APPLE_API_ISSUER_ID }}
          api-key-id: ${{ secrets.APPLE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPLE_API_KEY }}

      # Injeta método de export e Team ID real no ExportOptions.plist
      # Mapeamento para nomes atuais do Xcode 16+
      # SECURITY: inputs do workflow_dispatch são mapeados para env vars antes de
      # serem usados no shell, evitando script injection via ${{ }} interpolation.
      - name: Configure ExportOptions.plist
        env:
          INPUT_METHOD: ${{ github.event.inputs.export_method || 'app-store' }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          case "$INPUT_METHOD" in
            ad-hoc)      METHOD="release-testing" ;;
            app-store)   METHOD="app-store-connect" ;;
            development) METHOD="development" ;;
            *)           echo "Invalid export_method: $INPUT_METHOD"; exit 1 ;;
          esac
          /usr/libexec/PlistBuddy -c "Set :method $METHOD" iosApp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Set :teamID $APPLE_TEAM_ID" iosApp/ExportOptions.plist

      # Escreve a API key do App Store Connect em arquivo para autenticação do xcodebuild
      - name: Write Apple API Key file
        run: |
          mkdir -p /tmp/apple_api_keys
          echo "${{ secrets.APPLE_API_KEY }}" \
            > "/tmp/apple_api_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8"

      # Arquiva usando Automatic signing com autenticação via API key.
      # -allowProvisioningUpdates + -authenticationKey* permite que o Xcode:
      #   1. Associe o certificado do keychain ao perfil correto automaticamente
      #   2. Baixe/crie o perfil se necessário, sem poluir os targets dos Pods
      - name: Archive iOS App
        run: |
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          PROFILE_UUID=$(for f in "$PROFILES_DIR"/*.mobileprovision; do
            plist=$(security cms -D -i "$f" 2>/dev/null) || continue
            bid=$(echo "$plist" | /usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" /dev/stdin 2>/dev/null || true)
            [[ "$bid" != *"com.afilaxy.app" ]] && continue
            echo "$plist" | /usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin 2>/dev/null
          done | head -1)
          echo "Profile UUID: $PROFILE_UUID"

          xcodebuild \
            -workspace iosApp/iosApp.xcworkspace \
            -scheme iosApp \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $RUNNER_TEMP/iosApp.xcarchive \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_UUID" \
            JAVA_HOME="$JAVA_HOME" \
            archive 2>&1 | tee /tmp/xcodebuild.log; \
          STATUS=${PIPESTATUS[0]}; \
          if [ $STATUS -ne 0 ]; then \
            echo "=== ERROS DE COMPILAÇÃO ===" && grep -E "^.*(error:|warning: .*error)" /tmp/xcodebuild.log | head -50; \
            exit $STATUS; \
          fi

      # Exporta o IPA usando signingStyle=manual com o UUID escaneado dos perfis instalados.
      # O archive com -allowProvisioningUpdates atualiza/baixa o perfil correto para disco.
      # Não usa -allowProvisioningUpdates no export (ativaria Cloud Signing — enterprise only).
      - name: Export IPA
        run: |
          # Lê o método configurado no ExportOptions.plist para escolher o tipo de profile correto
          EXPORT_METHOD=$(/usr/libexec/PlistBuddy -c "Print :method" iosApp/ExportOptions.plist)
          echo "Export method: $EXPORT_METHOD"

          # Escaneia perfis instalados pós-archive, filtrando pelo tipo correto:
          #   app-store-connect → sem ProvisionedDevices + get-task-allow=false
          #   release-testing   → com ProvisionedDevices
          #   development       → get-task-allow=true
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          PROFILE_UUID=""
          echo "=== Perfis instalados pós-archive ==="
          for file in "$PROFILES_DIR"/*.mobileprovision; do
            plist=$(security cms -D -i "$file" 2>/dev/null) || continue
            entitlement=$(echo "$plist" | /usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" /dev/stdin 2>/dev/null || true)
            uuid=$(echo "$plist" | /usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin 2>/dev/null || true)
            hasDevices=$(echo "$plist" | /usr/libexec/PlistBuddy -c "Print :ProvisionedDevices" /dev/stdin 2>/dev/null && echo "yes" || echo "no")
            getTaskAllow=$(echo "$plist" | /usr/libexec/PlistBuddy -c "Print :Entitlements:get-task-allow" /dev/stdin 2>/dev/null || echo "false")
            echo "  UUID=$uuid  Entitlement=$entitlement  hasDevices=$hasDevices  getTaskAllow=$getTaskAllow"

            [[ "$entitlement" != *"com.afilaxy.app" ]] && continue

            case "$EXPORT_METHOD" in
              app-store-connect)
                # Seleciona perfil App Store: sem devices, não é development
                if [[ "$hasDevices" == "no" && "$getTaskAllow" != "true" ]]; then
                  PROFILE_UUID="$uuid"
                  break
                fi
                ;;
              release-testing)
                # Seleciona perfil Ad Hoc: tem devices registrados
                if [[ "$hasDevices" == "yes" ]]; then
                  PROFILE_UUID="$uuid"
                  break
                fi
                ;;
              development)
                if [[ "$getTaskAllow" == "true" ]]; then
                  PROFILE_UUID="$uuid"
                  break
                fi
                ;;
            esac
          done

          if [[ -z "$PROFILE_UUID" ]]; then
            echo "ERRO: Nenhum profile compatível com o método '$EXPORT_METHOD' encontrado."
            exit 1
          fi
          echo "Usando PROFILE_UUID=$PROFILE_UUID"

          # Atualiza ExportOptions.plist
          # NOTA: NÃO sobrescrever signingStyle — manter 'automatic' do plist
          # signingStyle=manual + uploadAndDistribute=true é incompatível no Xcode 16
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles dict" iosApp/ExportOptions.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy \
            -c "Set :provisioningProfiles:com.afilaxy.app $PROFILE_UUID" \
            iosApp/ExportOptions.plist 2>/dev/null || \
          /usr/libexec/PlistBuddy \
            -c "Add :provisioningProfiles:com.afilaxy.app string $PROFILE_UUID" \
            iosApp/ExportOptions.plist

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/iosApp.xcarchive" \
            -exportOptionsPlist iosApp/ExportOptions.plist \
            -exportPath "$RUNNER_TEMP/ipa" \
            -authenticationKeyPath "/tmp/apple_api_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8" \
            -authenticationKeyID "${{ secrets.APPLE_API_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APPLE_API_ISSUER_ID }}"

      # Valida que o upload ao TestFlight ocorreu (xcodebuild loga 'Uploading' quando bem sucedido)
      - name: Verify TestFlight Upload
        run: |
          IPA_PATH=$(find "$RUNNER_TEMP/ipa" -name "*.ipa" 2>/dev/null | head -1)
          if [[ -f "$IPA_PATH" ]]; then
            echo "✅ IPA gerado: $IPA_PATH ($(du -h "$IPA_PATH" | cut -f1))"
            echo "   Upload gerenciado por xcodebuild via uploadAndDistribute=true"
            echo "   Aguarde 5-30 min para processamento no App Store Connect."
          else
            echo "❌ IPA não encontrado em $RUNNER_TEMP/ipa"
            exit 1
          fi

      # Faz upload do IPA como artefato do Actions
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iosApp-${{ github.sha }}.ipa
          path: ${{ runner.temp }}/ipa/*.ipa
          retention-days: 30

      # Upload ao TestFlight: gerenciado pelo xcodebuild -exportArchive via
      # uploadAndDistribute=true no ExportOptions.plist (Xcode 16+).
      # xcrun altool foi removido no Xcode 15.4 / Xcode 16 — não usar.
      - name: Confirm TestFlight Upload
        run: |
          EXPORT_METHOD=$(/usr/libexec/PlistBuddy -c "Print :method" iosApp/ExportOptions.plist)
          if [[ "$EXPORT_METHOD" == "app-store-connect" ]]; then
            echo "✅ Upload ao TestFlight realizado pelo xcodebuild via uploadAndDistribute=true"
            echo "   Aguarde alguns minutos para o build aparecer no App Store Connect."
          else
            echo "ℹ️  Método '$EXPORT_METHOD' — sem upload ao TestFlight."
          fi
