name: Shared Module Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Inject WAQI API token
      run: echo "WAQI_API_TOKEN=${{ secrets.WAQI_API_TOKEN }}" >> local.properties
    
    - name: Run shared JVM unit tests
      # testDebugUnitTest runs JVM tests only — K/N targets require macOS runner and are skipped silently on Linux
      run: ./gradlew shared:testDebugUnitTest --stacktrace
