# .swiftlint.yml — Configuração do SwiftLint para o Afilaxy iOS
#
# Estratégia: mesma abordagem do detekt.yml — suprimir regras que são
# restrições arquiteturais inerentes ao SwiftUI/KMM, manter regras de qualidade real.
# Regras triviais são corrigidas automaticamente no CI com `swiftlint lint --fix`.

disabled_rules:
  # SwiftUI — closures com múltiplos argumentos são padrão declarativo (Label, Button, etc.)
  - multiple_closures_with_trailing_closure
  # `= nil` explícito é mais legível que implícito em @State/@StateObject
  - implicit_optional_initialization
  # TODOs são anotações válidas de tech debt — gerenciados no roadmap
  - todo
  # Tuplas com 3+ membros são comuns em funções SwiftUI de formatação de data/hora
  - large_tuple
  # Complexidade ciclomática — navegação e máquinas de estado são inerentemente complexas
  # (mesmo tratamento dado ao EmergencyViewModel no detekt.yml)
  - cyclomatic_complexity

opt_in_rules:
  - empty_count
  - contains_over_filter_count

# Comprimento de linha — SwiftUI gera linhas longas em closures encadeadas.
# warning == error: com --strict warnings viram erros; unificamos os níveis
# para evitar falsos positivos em código estruturalmente necessário.
line_length:
  warning: 250
  error: 300
  ignores_comments: true
  ignores_urls: true

# Tamanho de arquivo — Views complexas (HomeView 728 linhas) são inerentes ao SwiftUI
file_length:
  warning: 850
  error: 1000

# Corpo de função — SwiftUI body{} e funções de navegação excedem 50 linhas facilmente
# EmergencyView body tem 170 linhas de código real
function_body_length:
  warning: 200
  error: 300

# Corpo de tipo — HomeView tem 441 linhas de código (excluindo comentários/whitespace)
type_body_length:
  warning: 500
  error: 700

# Nomes de identificador — variáveis curtas são convenção em Swift:
# - Closures: a/r/g/b (componentes de cor), h (helper), p (professional),
#   i (index), d (data/document), s (state), f (file/font), e (error), t (timestamp)
# - Domínio: db (Firestore), ms (milliseconds), ts (timestamp), uf (unidade federativa)
# - KMM: vm (viewModel), cr (CheckInResponse), ar (array result)
# - allowed_symbols: permite _ para @State e @Environment projected values
identifier_name:
  min_length:
    warning: 1
    error: 1
  max_length:
    warning: 60
    error: 80
  allowed_symbols: ["_"]
  excluded:
    - id
    - vm      # viewModel — padrão KMM-ViewModel
    - cr      # CheckInResponse
    - ar      # array result
    - ts      # timestamp
    - ms      # milliseconds
    - uf      # unidade federativa (domínio brasileiro)
    - db      # Firestore database reference
    - d1      # date1 (comparações de data)
    - d2      # date2
    - e       # error em catch { let e = ... }
    - d       # document/data em closures Firestore
    - t       # timestamp em closures
    - f       # file/font/formatter em closures
    - h       # helper em closures de mapa
    - p       # professional/person em closures
    - r       # result/response em closures
    - s       # state/string em closures
    - i       # index em forEach/enumerated
    - g       # green — componente de cor ARGB
    - b       # blue  — componente de cor ARGB
    - a       # alpha — componente de cor ARGB
  validates_start_with_lowercase: warning

# Trailing whitespace — ignora linhas vazias (editores às vezes inserem)
trailing_whitespace:
  ignores_empty_lines: true

# Excluir diretórios gerados e dependências
excluded:
  - Pods
  - build
  - DerivedData
  - .build
